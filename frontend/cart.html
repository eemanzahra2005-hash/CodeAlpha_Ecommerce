<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - CodeAlpha E-Commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <h1>CodeAlpha Store</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">Products</a></li>
            <li id="auth-nav-item"><a href="login.html">Login</a></li>
            <li class="cart-icon-container">
                <a href="cart.html" class="cart-icon">🛒</a>
                <span id="cart-badge" class="cart-badge">0</span>
            </li>
        </ul>
    </nav>

    <section class="cart-page">
        <div class="cart-page-container">
            <h1>Shopping Cart</h1>

            <div id="cart-content" class="cart-content">
                <!-- Cart items will be rendered here -->
            </div>

            <div id="empty-cart-message" class="empty-cart-message" style="display: none;">
                <div class="empty-state">
                    <p class="empty-icon">🛒</p>
                    <h2>Your Cart is Empty</h2>
                    <p>Looks like you haven't added anything to your cart yet.</p>
                    <a href="index.html" class="continue-shopping-btn">Continue Shopping</a>
                </div>
            </div>

            <div id="cart-summary" class="cart-summary" style="display: none;">
                <div class="cart-summary-content">
                    <div class="summary-row subtotal-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row tax-row">
                        <span>Tax (10%):</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <div class="summary-row total-row">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                    <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 CodeAlpha Store. All Rights Reserved.</p>
    </footer>

    <script src="auth.js"></script>
    <script src="cart.js"></script>
</body>

</html>
