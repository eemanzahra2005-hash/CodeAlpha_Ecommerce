<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeAlpha E-Commerce</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<body>

    <nav>
        <h1>CodeAlpha Store</h1>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Cart</a></li>
            <li><a href="#">Login</a></li>
        </ul>
    </nav>

    <section class="hero">

    </section>

                <h3>Shoes</h3>

                <p>$50</p>

                <button>Add to Cart</button>

            </div>

            <div class="product-card">

                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" alt="Watch">

                <h3>Watch</h3>

                <p>$70</p>

                <button>Add to Cart</button>

            </div>

            <div class="product-card">

                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400" alt="Phone">

                <h3>Phone</h3>

                <p>$300</p>

                <button>Add to Cart</button>

            </div>

        </div>

    </section>

    <footer>
        <p>© 2026 CodeAlpha Store. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
