<!-- Signup page: lets new users create an account with their name, email, and password -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CodeAlpha Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <h1>CodeAlpha Store</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">Products</a></li>
            <li id="auth-nav-item"><a href="login.html">Login</a></li>
            <li class="cart-icon-container">
                <a href="cart.html" class="cart-icon">🛒</a>
                <span id="cart-badge" class="cart-badge">0</span>
            </li>
        </ul>
    </nav>

    <section class="auth-page">
        <div class="auth-card">

            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join CodeAlpha Store today</p>
            </div>

            <div id="error-banner" class="error-banner" style="display:none;"></div>
            <div id="success-banner" class="success-banner" style="display:none;"></div>

            <form id="signup-form" class="auth-form" novalidate>

                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="fullName" placeholder="Full name" required autocomplete="name">
                </div>

                <div class="input-group">
                    <span class="input-icon">✉</span>
                    <input type="email" id="email" placeholder="Email address" required autocomplete="email">
                    <span class="field-status" id="email-status"></span>
                </div>

                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" placeholder="Password (min 6 characters)" required autocomplete="new-password">
                    <button type="button" class="eye-toggle" id="eye-toggle" aria-label="Toggle password visibility">👁</button>
                </div>

                <div class="password-strength" id="password-strength" style="display:none;">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <span class="strength-label" id="strength-label"></span>
                </div>

                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required autocomplete="new-password">
                    <span class="field-status" id="confirm-status"></span>
                </div>

                <button type="submit" id="signup-btn" class="auth-btn">
                    <span class="btn-spinner" style="display:none;"></span>
                    <span class="btn-text">Create Account</span>
                </button>

            </form>

            <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>

        </div>
    </section>

    <footer>
        <p>© 2026 CodeAlpha Store. All Rights Reserved.</p>
    </footer>

    <script src="auth.js"></script>

</body>
</html>
